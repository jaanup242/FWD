<!DOCTYPE html>
<html>
<head>

<title>Task Tracking Activity Control Application</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Task Tracking Activity Control Application for managing tasks and reminders">
<meta name="keywords" content="task tracker, reminder, productivity, web application">
<meta name="author" content="Student Project">

<style>

:root{
    --main-font:"Segoe UI",Arial,sans-serif;
    --primary-color:#7b83eb;
    --edit-color:#b48cff;
    --delete-color:#ff7a8a;
}

body{
    font-family:var(--main-font);
    margin:0;
    padding:25px;
    text-align:center;
    color:#2f2f2f;

    background:
        linear-gradient(135deg,#dcd3ff 0%,#ffd6e5 40%,#c9f3e4 75%,#dcd3ff 100%);
}

h1{
    color:#3f3f68;
    margin-bottom:25px;
}

.today-date-box{
    background:linear-gradient(135deg,#f6e6ff,#ffd9e6);
    padding:18px;
    border-radius:14px;
    margin-bottom:30px;
    box-shadow:0 12px 24px rgba(0,0,0,.15);
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    max-width:900px;
    margin:auto;
}

.card{
    border-radius:16px;
    padding:22px;
    min-height:260px;
    transition:.25s;
    box-shadow:0 14px 28px rgba(0,0,0,.15);
}

.card:nth-child(1){ background:#f6e6ff; }
.card:nth-child(2){ background:#ffe4ec; }
.card:nth-child(3){ background:#f0ddff; }
.card:nth-child(4){ background:#ffd9e6; }

.card:hover{
    transform:translateY(-6px);
    filter:brightness(1.03);
}

ul{ list-style:none; padding:0; }

li{
    background:white;
    margin:10px 0;
    padding:12px;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    box-shadow:0 4px 12px rgba(0,0,0,.10);
    animation:fadeIn .4s ease;
}

.task-info{ text-align:left; }

.status{
    font-size:12px;
    font-weight:600;
}

.overdue-tag{ color:#e63946; }
.today-tag{ color:#e9c46a; }
.future-tag{ color:#2a9d8f; }

button{
    margin:3px;
    border:none;
    padding:6px 12px;
    border-radius:7px;
    cursor:pointer;
    color:white;
}

.add-btn{ background:var(--primary-color); }
.edit-btn{ background:var(--edit-color); }
.del-btn{ background:var(--delete-color); }

button:hover{ transform:scale(1.05); }

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

@media(max-width:700px){
    .container{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<h1>Task Tracking Activity Control Application</h1>

<div class="today-date-box">
<b>Enter Today's Date</b><br><br>
<input type="date" id="todayDate">
</div>

<div class="container">

<div class="card">
<h3>Top Priorities ⭐</h3>
<button class="add-btn" onclick="addTask('top')">Add</button>
<ul id="top"></ul>
</div>

<div class="card">
<h3>Must Do 🔥</h3>
<button class="add-btn" onclick="addTask('must')">Add</button>
<ul id="must"></ul>
</div>

<div class="card">
<h3>Should Do ✅</h3>
<button class="add-btn" onclick="addTask('should')">Add</button>
<ul id="should"></ul>
</div>

<div class="card">
<h3>Could Do 🌙</h3>
<button class="add-btn" onclick="addTask('could')">Add</button>
<ul id="could"></ul>
</div>

</div>

<script>

const logTask = (task) => console.log("Task created:", task);

/* DATE PICKER */
function openDatePicker(currentValue, callback){
    let picker=document.createElement("input");
    picker.type="date";
    picker.value=currentValue;

    picker.style.position="fixed";
    picker.style.top="50%";
    picker.style.left="50%";
    picker.style.transform="translate(-50%,-50%)";
    picker.style.zIndex="9999";

    document.body.appendChild(picker);

    picker.focus();
    if(picker.showPicker) picker.showPicker();

    picker.onchange=function(){
        callback(picker.value);
        picker.remove();
    };

    picker.onblur=function(){
        setTimeout(()=>picker.remove(),200);
    };
}

/* TIME PICKER */
function openTimePicker(currentValue, callback){
    let picker=document.createElement("input");
    picker.type="time";
    picker.value=currentValue;

    picker.style.position="fixed";
    picker.style.top="50%";
    picker.style.left="50%";
    picker.style.transform="translate(-50%,-50%)";
    picker.style.zIndex="9999";

    document.body.appendChild(picker);

    picker.focus();
    if(picker.showPicker) picker.showPicker();

    picker.onchange=function(){
        callback(picker.value);
        picker.remove();
    };

    picker.onblur=function(){
        setTimeout(()=>picker.remove(),200);
    };
}

/* NOTIFICATION */
if("Notification" in window){
    Notification.requestPermission();
}

function sendNotification(message){
    if(Notification.permission==="granted"){
        new Notification("Task Reminder 🔔",{ body:message });
    }
}

/* STATUS */
function updateStatus(tag,due){

    let entered=document.getElementById("todayDate").value;
    if(!entered){
        tag.textContent="Set today's date";
        return;
    }

    let today=new Date(entered);
    let dueDate=new Date(due);

    today.setHours(0,0,0,0);
    dueDate.setHours(0,0,0,0);

    let diff=Math.ceil((dueDate-today)/(1000*60*60*24));

    tag.className="status";

    if(diff<0){
        tag.textContent="Overdue";
        tag.classList.add("overdue-tag");
    }
    else if(diff===0){
        tag.textContent="Today";
        tag.classList.add("today-tag");
    }
    else{
        tag.textContent=diff+" day(s) left";
        tag.classList.add("future-tag");
    }
}

/* ADD TASK */
function addTask(section){

try{

    let task=prompt("Enter task:");
    if(!task) return;

    logTask(task);

    let due=prompt("Enter due date (YYYY-MM-DD):");
    if(!due) return;

    let time=prompt("Enter reminder time (HH:MM 24hr):");
    if(!time) time="09:00";

    document.getElementById(section)
        .appendChild(createTaskElement(task,due,time,section));

}catch(error){

    console.error("Task creation error:",error);
    alert("Error creating task");

}

}

/* CREATE TASK */
function createTaskElement(task,due,time,section){

    let li=document.createElement("li");

    let info=document.createElement("div");
    info.className="task-info";

    let title=document.createElement("div");
    title.textContent=task;

    let status=document.createElement("span");
    updateStatus(status,due);

    let dueText=document.createElement("div");
    dueText.textContent="Due: "+due;

    let timeText=document.createElement("div");
    timeText.textContent="Reminder: "+time;

    info.appendChild(title);
    info.appendChild(status);
    info.appendChild(dueText);
    info.appendChild(timeText);

    let editName=document.createElement("button");
    editName.textContent="Edit Task";
    editName.className="edit-btn";
    editName.onclick=function(){
        let newTask=prompt("Edit task:",title.textContent);
        if(newTask) title.textContent=newTask;
    };

    let editDate=document.createElement("button");
    editDate.textContent="Edit Date";
    editDate.className="edit-btn";
    editDate.onclick=function(){
        openDatePicker(li.dataset.due,function(newDue){
            li.dataset.due=newDue;
            dueText.textContent="Due: "+newDue;
            updateStatus(status,newDue);
        });
    };

    let editTime=document.createElement("button");
    editTime.textContent="Edit Time";
    editTime.className="edit-btn";
    editTime.onclick=function(){
        openTimePicker(li.dataset.time,function(newTime){
            li.dataset.time=newTime;
            timeText.textContent="Reminder: "+newTime;
        });
    };

    let del=document.createElement("button");
    del.textContent="Delete";
    del.className="del-btn";
    del.onclick=function(){ li.remove(); };

    li.appendChild(info);
    li.appendChild(editName);
    li.appendChild(editDate);
    li.appendChild(editTime);
    li.appendChild(del);

    li.dataset.due=due;
    li.dataset.time=time;
    li.dataset.section=section;

    return li;
}

/* REMINDER ENGINE */
let triggered={};

function checkReminders(){

    let entered=document.getElementById("todayDate").value;
    if(!entered) return;

    let now=new Date();

    document.querySelectorAll("li").forEach((li,i)=>{

        if(li.dataset.due !== entered) return;

        let t=li.dataset.time.split(":");
        let d=entered.split("-");

        let reminderDate=new Date(d[0],d[1]-1,d[2],t[0],t[1],0,0);

        let key=i+entered+li.dataset.time;

        if(now>=reminderDate && !triggered[key]){
            sendNotification("Reminder: Task due now!");
            triggered[key]=true;
        }
    });
}

setInterval(checkReminders,1000);

/* PROMISE DEMO */
function simulateServer(){
    return new Promise(resolve=>{
        setTimeout(()=>resolve("Server synced"),1000);
    });
}

simulateServer().then(msg=>console.log(msg));

/* API FETCH DEMO */
fetch("https://jsonplaceholder.typicode.com/posts/1")
.then(res=>res.json())
.then(data=>console.log("API Test:",data))
.catch(err=>console.log("API error:",err));

</script>

</body>
</html>
